name: English Only Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  english-only:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run english-only check
        run: npm run check:english
