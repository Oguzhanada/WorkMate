name: WorkMate Nightly E2E

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketplace

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: marketplace/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full E2E suite
        run: npm run test:e2e
        env:
          E2E_CUSTOMER_EMAIL: ${{ secrets.E2E_CUSTOMER_EMAIL }}
          E2E_CUSTOMER_PASSWORD: ${{ secrets.E2E_CUSTOMER_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-nightly-report
          path: |
            marketplace/playwright-report
            marketplace/test-results
          if-no-files-found: ignore

      - name: Send Slack failure notification
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data "{\"text\":\"WorkMate nightly E2E failed on ${{ github.ref_name }}. Check artifacts in Actions.\"}" \
          "${{ secrets.SLACK_WEBHOOK_URL }}"
